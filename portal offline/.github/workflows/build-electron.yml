name: Build Electron App

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allows you to trigger the build manually from the browser

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Build the Windows package
      run: npm run electron:pack:win

    - name: Upload Windows App Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MoE-Fees-Approval-Windows
        path: electron-release/MoE-Fees-Approval-win32-x64/
